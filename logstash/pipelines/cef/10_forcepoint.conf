filter {
  if "forcepoint" in [tags] {
    # Case olaylarında caseDescription mesaj olarak kullan
    if [caseDescription] and ![message] {
      mutate { rename => { "caseDescription" => "message" } }
    }

    # loginName → sourceUserId
    if [loginName] {
      mutate { rename => { "loginName" => "sourceUserId" } }
    }

    # sourceIp (non-standard) → sourceAddress, "N/A" ise atla
    if [sourceIp] and [sourceIp] != "N/A" and ![sourceAddress] {
      mutate { rename => { "sourceIp" => "sourceAddress" } }
    }

    # sourceHost (non-standard) → sourceHostName
    if [sourceHost] and ![sourceHostName] {
      mutate { rename => { "sourceHost" => "sourceHostName" } }
    }

    # destinationHosts → destinationHostName
    if [destinationHosts] and [destinationHosts] != "N/A" and ![destinationHostName] {
      mutate { rename => { "destinationHosts" => "destinationHostName" } }
    }
  }
}
