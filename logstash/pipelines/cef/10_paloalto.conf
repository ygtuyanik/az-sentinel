filter {
  if "palo_alto" in [tags] {
    # Timestamp: önce deviceCustomDate1, yoksa rt (receiptTime)
    if [deviceCustomDate1] {
      date {
        match   => ["deviceCustomDate1", "yyyy/MM/dd HH:mm:ss", "ISO8601"]
        target  => "@timestamp"
        timezone => "UTC"
      }
    } else if [receiptTime] {
      date {
        match   => ["receiptTime", "MMM dd yyyy HH:mm:ss zzz", "MMM  d yyyy HH:mm:ss zzz", "ISO8601"]
        target  => "@timestamp"
        timezone => "UTC"
      }
    }

    # Gürültü filtresi: drop, deny, DNS (port 53) TRAFFIC eventleri
    if [Activity] == "TRAFFIC" {
      if [DeviceAction] == "drop" or [DeviceAction] == "deny" { drop {} }
      if [DestinationPort] == 53                              { drop {} }
    }
  }
}
