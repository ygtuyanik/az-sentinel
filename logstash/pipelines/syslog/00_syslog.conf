input {
  tcp {
    port => 5516
    tags => ["syslog"]
  }
  udp {
    port => 5516
    tags => ["syslog"]
  }
}

filter {
  # ── Syslog başlığı parse ──────────────────────────────────────────────────────
  grok {
    match => {
      "message" => [
        # RFC 5424
        "<%{POSINT:syslog_pri}>%{NONNEGINT:syslog_version} %{TIMESTAMP_ISO8601:syslog_timestamp} %{IPORHOST:syslog_host} %{DATA:syslog_app} %{DATA:syslog_proc} %{DATA:syslog_msgid} %{GREEDYDATA:syslog_msg}",
        # RFC 3164
        "<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_timestamp} %{IPORHOST:syslog_host} %{DATA:syslog_app}(?:\\[%{POSINT:syslog_pid}\\])?: %{GREEDYDATA:syslog_msg}",
        # Başlıksız (sadece mesaj)
        "%{GREEDYDATA:syslog_msg}"
      ]
    }
  }

  # ── Severity / facility hesapla ───────────────────────────────────────────────
  if [syslog_pri] {
    ruby {
      code => "
        pri = event.get('syslog_pri').to_i
        event.set('syslog_facility', pri / 8)
        event.set('syslog_severity', pri % 8)
        severities = ['Emergency','Alert','Critical','Error','Warning','Notice','Informational','Debug']
        event.set('syslog_severity_label', severities[pri % 8] || 'Unknown')
      "
    }
  }

  # ── Timestamp ─────────────────────────────────────────────────────────────────
  if [syslog_timestamp] {
    date {
      match   => ["syslog_timestamp", "ISO8601", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target  => "@timestamp"
      timezone => "UTC"
    }
  }

  # ── CEF içeren syslog mesajlarını yeniden etiketle ────────────────────────────
  if [syslog_msg] =~ /^CEF:/ {
    mutate { add_tag => ["cef_in_syslog"] }
    # Bu loglar normalde palo_alto veya imperva pipeline'ına gelmeli
    # Burada geliyorsa yine de parse et
    grok {
      match => {
        "syslog_msg" => "CEF:%{INT:cef_version}\|%{DATA:cef_device_vendor}\|%{DATA:cef_device_product}\|%{DATA:cef_device_version}\|%{DATA:cef_signature_id}\|%{DATA:cef_name}\|%{DATA:cef_severity}\|%{GREEDYDATA:cef_extensions}"
      }
    }
  }

  # ── Microsoft-Syslog şemasına eşle ───────────────────────────────────────────
  mutate {
    rename => {
      "syslog_host"           => "HostName"
      "syslog_msg"            => "SyslogMessage"
      "syslog_app"            => "ProcessName"
      "syslog_pid"            => "ProcessID"
      "syslog_severity_label" => "SeverityLevel"
      "syslog_facility"       => "Facility"
    }
    copy         => { "HostName" => "Computer" }
    remove_field => ["host", "syslog_pri", "syslog_timestamp", "syslog_version",
                     "syslog_msgid", "syslog_severity", "message"]
  }
}

output {
  microsoft-sentinel-log-analytics-logstash-output-plugin {
    client_app_Id             => "${CLIENT_APP_ID}"
    client_app_secret         => "${CLIENT_APP_SECRET}"
    tenant_id                 => "${TENANT_ID}"
    data_collection_endpoint  => "${DCE_ENDPOINT}"
    dcr_immutable_id          => "${SYSLOG_DCR_IMMUTABLE_ID}"
    dcr_stream_name           => "${SYSLOG_DCR_STREAM_NAME}"
    create_sample_file        => false
  }
  # stdout { codec => rubydebug }
}
