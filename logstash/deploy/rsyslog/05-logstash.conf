# rsyslog → Logstash forwarder
# Kopyala: /etc/rsyslog.d/05-logstash.conf
#
# CEF/Syslog gönderen kaynak cihazların IP'lerini aşağıya ekle.
# Logstash aynı sunucuda ise target 127.0.0.1 olarak bırakılabilir.

template(name="LOGSTASH_FORWARD" type="string" string="<%PRI%>%TIMESTAMP% %HOSTNAME% %syslogtag%%msg%")

if $fromhost-ip == '10.0.0.1' or \
   $fromhost-ip == '10.0.0.2' \
then {
    action(type="omfwd"
    template="LOGSTASH_FORWARD"
    target="127.0.0.1" Port="5514" Protocol="udp")
    stop
}
